name: CI Build, Test, and Image Artifact

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build website
        run: npm run build

      - name: Generate image artifact
        run: npm run generate-image

      - name: Upload website image artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-image
          path: artifacts/site-image.png

      - name: Upload site dist files
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: dist
